name: Nightly
run-name: Nightly build (${{ github.event_name == 'workflow_dispatch' && 'manual' || 'scheduled' }})

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      force_aur_publish:
        description: Force the nightly AUR publish job to reuse the existing prerelease assets.
        required: false
        default: false
        type: boolean
      aur_release_tag:
        description: Optional existing nightly tag to reuse when manually recovering AUR publishing.
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  prepare-nightly:
    name: Prepare nightly metadata
    runs-on: ubuntu-latest
    outputs:
      should_publish_release: ${{ steps.decide.outputs.should_publish_release }}
      should_publish_aur: ${{ steps.decide.outputs.should_publish_aur }}
      aur_asset_source: ${{ steps.decide.outputs.aur_asset_source }}
      aur_nightly_label: ${{ steps.decide.outputs.aur_nightly_label }}
      aur_nightly_tag: ${{ steps.decide.outputs.aur_nightly_tag }}
      base_version: ${{ steps.metadata.outputs.base_version }}
      nightly_label: ${{ steps.metadata.outputs.nightly_label }}
      nightly_tag: ${{ steps.metadata.outputs.nightly_tag }}
      short_sha: ${{ steps.metadata.outputs.short_sha }}
      nightly_date: ${{ steps.metadata.outputs.nightly_date }}
      source_commit: ${{ steps.decide.outputs.source_commit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve nightly metadata
        id: metadata
        run: |
          eval "$(bash build/scripts/resolve-nightly-metadata.sh)"
          echo "base_version=$base_version" >> "$GITHUB_OUTPUT"
          echo "nightly_label=$nightly_label" >> "$GITHUB_OUTPUT"
          echo "nightly_tag=nightly-$nightly_date" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "nightly_date=$nightly_date" >> "$GITHUB_OUTPUT"

      - name: Read existing nightly prerelease
        id: existing
        uses: actions/github-script@v7
        env:
          LOOKUP_NIGHTLY_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.aur_release_tag || steps.metadata.outputs.nightly_tag }}
          SOURCE_COMMIT: ${{ github.sha }}
        with:
          script: |
            const lookupTag = process.env.LOOKUP_NIGHTLY_TAG;
            const sourceCommit = process.env.SOURCE_COMMIT;

            const parseMetadata = (release) => {
              const body = release.body || '';
              const shaMatch = body.match(/^Nightly source commit:\s*(.+)$/m);
              const labelMatch = body.match(/^Nightly version label:\s*(.+)$/m);
              let label = labelMatch ? labelMatch[1].trim() : '';

              if (!label) {
                for (const asset of release.assets || []) {
                  const assetMatch = asset.name.match(/^linglong-store-(.+)-linux-amd64\.tar\.gz$/);
                  if (assetMatch) {
                    label = assetMatch[1];
                    break;
                  }
                }
              }

              return {
                tag: release.tag_name || '',
                publishedSha: shaMatch ? shaMatch[1].trim() : '',
                publishedLabel: label,
              };
            };

            const setOutputs = ({ tag, publishedSha, publishedLabel }) => {
              core.setOutput('release_tag', tag || '');
              core.setOutput('published_sha', publishedSha || '');
              core.setOutput('published_label', publishedLabel || '');
            };

            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: lookupTag,
              });
              setOutputs(parseMetadata(data));
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              const releases = await github.paginate(github.rest.repos.listReleases, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });

              const matchedRelease = releases
                .filter((release) => release.prerelease && release.tag_name.startsWith('nightly-'))
                .map((release) => ({ release, metadata: parseMetadata(release) }))
                .find(({ metadata }) => metadata.publishedSha === sourceCommit);

              if (matchedRelease) {
                setOutputs(matchedRelease.metadata);
              } else {
                setOutputs({ tag: lookupTag, publishedSha: '', publishedLabel: '' });
              }
            }

      - name: Decide whether nightly should publish
        id: decide
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PUBLISHED_SHA: ${{ steps.existing.outputs.published_sha }}
          PUBLISHED_LABEL: ${{ steps.existing.outputs.published_label }}
          PUBLISHED_RELEASE_TAG: ${{ steps.existing.outputs.release_tag }}
          COMPUTED_NIGHTLY_LABEL: ${{ steps.metadata.outputs.nightly_label }}
          COMPUTED_NIGHTLY_TAG: ${{ steps.metadata.outputs.nightly_tag }}
          AUR_RELEASE_TAG_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.aur_release_tag || '' }}
          FORCE_AUR_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.force_aur_publish || 'false' }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          source_commit="$(git rev-parse HEAD)"
          release_reason="changes detected"
          aur_reason="nightly prerelease will be published in this run"
          should_publish_release="true"
          should_publish_aur="true"
          aur_asset_source="artifact"
          aur_nightly_label="$COMPUTED_NIGHTLY_LABEL"
          aur_nightly_tag="$COMPUTED_NIGHTLY_TAG"

          if [[ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]]; then
            should_publish_release="false"
            should_publish_aur="false"
            aur_asset_source="none"
            release_reason="nightly only publishes from ${DEFAULT_BRANCH}"
            aur_reason="$release_reason"
          elif [[ "$FORCE_AUR_PUBLISH" == "true" && -n "$AUR_RELEASE_TAG_INPUT" ]]; then
            if [[ "$PUBLISHED_RELEASE_TAG" != "$AUR_RELEASE_TAG_INPUT" ]]; then
              echo "Requested aur_release_tag ${AUR_RELEASE_TAG_INPUT} was not found in existing nightly releases." >&2
              exit 1
            fi

            if [[ -z "$PUBLISHED_LABEL" ]]; then
              echo "Requested aur_release_tag ${AUR_RELEASE_TAG_INPUT} is missing a recoverable nightly version label." >&2
              exit 1
            fi

            should_publish_release="false"
            should_publish_aur="true"
            aur_asset_source="release"
            aur_nightly_tag="$PUBLISHED_RELEASE_TAG"
            aur_nightly_label="$PUBLISHED_LABEL"
            release_reason="manual AUR recovery requested for ${PUBLISHED_RELEASE_TAG}; skip prerelease publishing"
            aur_reason="workflow_dispatch forced AUR publish using explicitly requested nightly prerelease assets"
          elif [[ -n "$PUBLISHED_SHA" && "$PUBLISHED_SHA" == "$source_commit" ]]; then
            should_publish_release="false"
            release_reason="HEAD ${source_commit} already published to nightly"

            if [[ "$RUN_ATTEMPT" -gt 1 ]]; then
              should_publish_aur="true"
              aur_asset_source="release"
              aur_reason="rerun detected; reuse the existing nightly prerelease assets for AUR recovery"
            elif [[ "$FORCE_AUR_PUBLISH" == "true" ]]; then
              should_publish_aur="true"
              aur_asset_source="release"
              aur_reason="workflow_dispatch forced AUR publish using existing nightly prerelease assets"
            else
              should_publish_aur="false"
              aur_asset_source="none"
              aur_reason="nightly prerelease already matches HEAD; skip first-attempt AUR publish too"
            fi

            if [[ "$aur_asset_source" == "release" ]]; then
              aur_nightly_tag="$PUBLISHED_RELEASE_TAG"
              if [[ -n "$PUBLISHED_LABEL" ]]; then
                aur_nightly_label="$PUBLISHED_LABEL"
              fi
            fi
          fi

          echo "source_commit=$source_commit" >> "$GITHUB_OUTPUT"
          echo "should_publish_release=$should_publish_release" >> "$GITHUB_OUTPUT"
          echo "should_publish_aur=$should_publish_aur" >> "$GITHUB_OUTPUT"
          echo "aur_asset_source=$aur_asset_source" >> "$GITHUB_OUTPUT"
          echo "aur_nightly_label=$aur_nightly_label" >> "$GITHUB_OUTPUT"
          echo "aur_nightly_tag=$aur_nightly_tag" >> "$GITHUB_OUTPUT"
          echo "Nightly release decision: $release_reason"
          echo "Nightly AUR decision: $aur_reason"
          {
            echo "Nightly release decision: $release_reason"
            echo "Nightly AUR decision: $aur_reason"
            echo "Nightly AUR asset source: $aur_asset_source"
            echo "Nightly AUR release tag: $aur_nightly_tag"
            echo "Nightly AUR version label: $aur_nightly_label"
          } >> "$GITHUB_STEP_SUMMARY"

  build-nightly-amd64:
    name: Build nightly amd64 ${{ needs.prepare-nightly.outputs.nightly_label }}
    needs: prepare-nightly
    if: ${{ needs.prepare-nightly.outputs.should_publish_release == 'true' }}
    runs-on: ubuntu-latest
    env:
      TARGET_ARCH: amd64
      RELEASE_VERSION: ${{ needs.prepare-nightly.outputs.base_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and cache Debian 10 release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/debian10-release.Dockerfile
          load: true
          tags: linglong-store/debian10-release:local
          cache-from: type=gha,scope=debian10-release
          cache-to: type=gha,mode=max,scope=debian10-release

      # Nightly keeps the full packaging smoke test that CI no longer runs.
      - name: Run Debian 10 packaging smoke test
        env:
          PACKAGE_CHANNEL: nightly
        run: bash build/scripts/package-smoke-test.sh

      - name: Stage nightly assets
        run: |
          bash build/scripts/prepare-nightly-assets.sh \
            --base-version "${RELEASE_VERSION}" \
            --nightly-label "${{ needs.prepare-nightly.outputs.nightly_label }}" \
            --arch "${TARGET_ARCH}" \
            --source-dir "build/out/linux/${RELEASE_VERSION}/${TARGET_ARCH}" \
            --output-dir "build/out/nightly/${{ needs.prepare-nightly.outputs.nightly_label }}/${TARGET_ARCH}"

      - name: Upload nightly assets
        uses: actions/upload-artifact@v4
        with:
          name: nightly-assets-amd64
          path: build/out/nightly/${{ needs.prepare-nightly.outputs.nightly_label }}/amd64
          if-no-files-found: error

  sign-nightly:
    name: Sign nightly assets
    needs: [prepare-nightly, build-nightly-amd64]
    if: ${{ needs.prepare-nightly.outputs.should_publish_release == 'true' && needs.build-nightly-amd64.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download nightly assets
        uses: actions/download-artifact@v4
        with:
          name: nightly-assets-amd64
          path: artifacts

      - name: Install RPM signing tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "GPG key imported successfully"

      - name: Configure RPM macros for signing
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # rpmsign runs without a TTY in GitHub Actions, so force loopback mode.
          install -d -m 700 ~/.gnupg
          printf '%s' "$GPG_PASSPHRASE" > ~/.gnupg/rpm-gpg-passphrase
          chmod 600 ~/.gnupg/rpm-gpg-passphrase
          gpg --batch --list-secret-keys --keyid-format LONG "$GPG_KEY_ID"
          # rpm -K verifies against the rpmdb keyring, so import the matching public key too.
          gpg --batch --armor --export "$GPG_KEY_ID" > /tmp/rpm-signing-public-key.asc
          rpm --import /tmp/rpm-signing-public-key.asc
          cat > ~/.rpmmacros <<EOF
          %_signature gpg
          %_gpg_name ${GPG_KEY_ID}
          %_gpg_path ${HOME}/.gnupg
          %__gpg /usr/bin/gpg
          %_gpg_digest_algo sha256
          %__gpg_sign_cmd %{__gpg} \
            --batch --no-verbose --no-armor --no-secmem-warning \
            --pinentry-mode loopback --passphrase-file %{_gpg_path}/rpm-gpg-passphrase \
            %{?_gpg_digest_algo:--digest-algo %{_gpg_digest_algo}} \
            --local-user "%{_gpg_name}" \
            --detach-sign --sign --output %{__signature_filename} %{__plaintext_filename}
          EOF

      - name: Sign nightly tarballs
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd artifacts
          for tarball in *.tar.gz; do
            if [[ -f "$tarball" ]]; then
              echo "Signing $tarball..."
              echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback --passphrase-fd 0 \
                --armor --detach-sign "$tarball"
            fi
          done
          ls -la *.asc || echo "No signature files created"

      - name: Sign nightly RPM packages
        run: |
          trap 'rm -f ~/.gnupg/rpm-gpg-passphrase' EXIT
          cd artifacts
          for rpm in *.rpm; do
            if [[ -f "$rpm" ]]; then
              echo "Signing $rpm..."
              rpmsign --addsign "$rpm"
            fi
          done
          # Verify signatures
          for rpm in *.rpm; do
            if [[ -f "$rpm" ]]; then
              echo "Verifying $rpm..."
              rpm -K "$rpm"
            fi
          done

      - name: Upload signed assets
        uses: actions/upload-artifact@v4
        with:
          name: signed-nightly-assets-amd64
          path: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.asc
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.AppImage
          if-no-files-found: error

  publish-nightly:
    name: Publish nightly ${{ needs.prepare-nightly.outputs.nightly_label }}
    needs: [prepare-nightly, sign-nightly]
    if: ${{ needs.prepare-nightly.outputs.should_publish_release == 'true' && needs.sign-nightly.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Download signed nightly assets
        uses: actions/download-artifact@v4
        with:
          name: signed-nightly-assets-amd64
          path: nightly-artifacts

      - name: Update nightly tag
        run: |
          git tag -f "${{ needs.prepare-nightly.outputs.nightly_tag }}" "${{ needs.prepare-nightly.outputs.source_commit }}"
          git push origin "refs/tags/${{ needs.prepare-nightly.outputs.nightly_tag }}" --force

      - name: Render nightly release notes
        run: |
          cat > nightly-release-notes.md <<EOF
          ## Nightly Build

          - Version label: ${{ needs.prepare-nightly.outputs.nightly_label }}
          - Architecture: amd64
          - Trigger: ${{ github.event_name }}

          ## Download
          - amd64: bundle / deb / rpm / AppImage

          ## Requirements
          - Linux
          - GTK 3
          - 玲珑运行环境

          Nightly source commit: ${{ needs.prepare-nightly.outputs.source_commit }}
          Nightly source date: ${{ needs.prepare-nightly.outputs.nightly_date }}
          Nightly version label: ${{ needs.prepare-nightly.outputs.nightly_label }}
          EOF

      - name: Publish nightly prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-nightly.outputs.nightly_tag }}
          target_commitish: ${{ needs.prepare-nightly.outputs.source_commit }}
          name: Nightly Build ${{ needs.prepare-nightly.outputs.nightly_label }}
          body_path: nightly-release-notes.md
          prerelease: true
          make_latest: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            nightly-artifacts/*

  publish-aur-nightly:
    name: Publish nightly AUR ${{ needs.prepare-nightly.outputs.nightly_label }}
    needs: [prepare-nightly, publish-nightly]
    if: ${{ always() && needs.prepare-nightly.outputs.should_publish_aur == 'true' && (needs.publish-nightly.result == 'success' || needs.prepare-nightly.outputs.aur_asset_source == 'release') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-nightly.outputs.source_commit }}
          fetch-depth: 0

      - name: Download signed nightly assets from this run
        if: ${{ needs.prepare-nightly.outputs.aur_asset_source == 'artifact' }}
        uses: actions/download-artifact@v4
        with:
          name: signed-nightly-assets-amd64
          path: signed-nightly-assets

      - name: Download signed nightly assets from existing prerelease
        if: ${{ needs.prepare-nightly.outputs.aur_asset_source == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p signed-nightly-assets
          gh release download "${{ needs.prepare-nightly.outputs.aur_nightly_tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --dir signed-nightly-assets \
            --pattern "linglong-store-${{ needs.prepare-nightly.outputs.aur_nightly_label }}-linux-amd64.tar.gz" \
            --pattern "linglong-store-${{ needs.prepare-nightly.outputs.aur_nightly_label }}-linux-amd64.tar.gz.asc"

      - name: Calculate nightly checksums
        id: checksums
        run: |
          tarball_path="signed-nightly-assets/linglong-store-${{ needs.prepare-nightly.outputs.aur_nightly_label }}-linux-amd64.tar.gz"
          if [[ ! -f "$tarball_path" ]]; then
            echo "Missing expected signed nightly tarball: $tarball_path" >&2
            exit 1
          fi

          sig_path="signed-nightly-assets/linglong-store-${{ needs.prepare-nightly.outputs.aur_nightly_label }}-linux-amd64.tar.gz.asc"
          if [[ ! -f "$sig_path" ]]; then
            echo "Missing expected signed nightly tarball signature: $sig_path" >&2
            exit 1
          fi

          sha_amd64="$(sha256sum "$tarball_path" | awk '{print $1}')"
          sha_sig_amd64="$(sha256sum "$sig_path" | awk '{print $1}')"

          echo "sha_amd64=$sha_amd64" >> "$GITHUB_OUTPUT"
          echo "sha_sig_amd64=$sha_sig_amd64" >> "$GITHUB_OUTPUT"

      - name: Normalize nightly AUR version
        id: aur-version
        run: |
          aur_version="$(bash build/scripts/normalize-nightly-aur-version.sh "${{ needs.prepare-nightly.outputs.aur_nightly_label }}")"
          echo "aur_version=$aur_version" >> "$GITHUB_OUTPUT"

      - name: Render nightly AUR metadata with publish inputs
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          metadata_dir="$(mktemp -d)"
          trap 'rm -rf "$metadata_dir"' EXIT

          expected_tarball_url="https://github.com/HanHan666666/flutter-linglong-store/releases/download/${{ needs.prepare-nightly.outputs.aur_nightly_tag }}/linglong-store-${{ needs.prepare-nightly.outputs.aur_nightly_label }}-linux-amd64.tar.gz"
          expected_signature_url="${expected_tarball_url}.asc"

          bash build/scripts/render-packaging-templates.sh \
            --inner \
            --version "${{ needs.prepare-nightly.outputs.aur_nightly_label }}" \
            --arch amd64 \
            --output-dir "$metadata_dir" \
            --channel nightly \
            --sha256-amd64 "${{ steps.checksums.outputs.sha_amd64 }}" \
            --sha256-sig-amd64 "${{ steps.checksums.outputs.sha_sig_amd64 }}" \
            --gpg-key-id "$GPG_KEY_ID"

          pkgbuild="$metadata_dir/aur/PKGBUILD"
          grep -Fqx "pkgname=linglong-store-nightly-bin" "$pkgbuild"
          grep -Fqx "pkgver=${{ steps.aur-version.outputs.aur_version }}" "$pkgbuild"
          grep -Fqx "validpgpkeys=('${GPG_KEY_ID}')" "$pkgbuild"
          grep -Fqx "  \"linglong-store-${{ needs.prepare-nightly.outputs.aur_nightly_label }}-linux-amd64.tar.gz::${expected_tarball_url}\"" "$pkgbuild"
          grep -Fqx "  \"linglong-store-${{ needs.prepare-nightly.outputs.aur_nightly_label }}-linux-amd64.tar.gz.asc::${expected_signature_url}\"" "$pkgbuild"
          grep -Fqx "  '${{ steps.checksums.outputs.sha_amd64 }}'" "$pkgbuild"
          grep -Fqx "  '${{ steps.checksums.outputs.sha_sig_amd64 }}'" "$pkgbuild"

      - name: Setup SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_key
            User aur
          EOF
          chmod 600 ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Validate nightly AUR package in Arch Linux
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          bash build/scripts/validate-aur-package.sh \
            --version "${{ needs.prepare-nightly.outputs.aur_nightly_label }}" \
            --channel nightly \
            --package-name linglong-store-nightly-bin \
            --aur-version "${{ steps.aur-version.outputs.aur_version }}" \
            --sha256-amd64 "${{ steps.checksums.outputs.sha_amd64 }}" \
            --sha256-sig-amd64 "${{ steps.checksums.outputs.sha_sig_amd64 }}" \
            --gpg-key-id "$GPG_KEY_ID"

      - name: Publish nightly AUR package
        env:
          SHA256_AMD64: ${{ steps.checksums.outputs.sha_amd64 }}
          SHA256_SIG_AMD64: ${{ steps.checksums.outputs.sha_sig_amd64 }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          bash build/scripts/publish-aur.sh \
            --version "${{ needs.prepare-nightly.outputs.aur_nightly_label }}" \
            --channel nightly \
            --package-name linglong-store-nightly-bin \
            --repo-url "ssh://aur@aur.archlinux.org/linglong-store-nightly-bin.git" \
            --aur-version "${{ steps.aur-version.outputs.aur_version }}" \
            --arch x86_64

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/aur_key
