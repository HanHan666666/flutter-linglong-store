name: Release
run-name: Release ${{ inputs.version || 'auto' }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Manual release version
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    # The exact version resolves inside this job when manual input is omitted.
    name: Prepare release ${{ inputs.version || 'auto' }}
    if: ${{ github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release-version.outputs.version }}
      tag: ${{ steps.release-version.outputs.tag }}
      source_commit: ${{ steps.source-commit.outputs.source_commit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Capture release source commit
        id: source-commit
        run: echo "source_commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve release version
        id: release-version
        env:
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          if [[ -n "${MANUAL_VERSION}" ]]; then
            version="$(bash build/scripts/resolve-release-version.sh --manual-version "${MANUAL_VERSION}")"
          else
            version="$(bash build/scripts/resolve-release-version.sh)"
          fi
          version="${version//$'\n'/}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Stage versioned release files
        run: |
          bash build/scripts/update-version-files.sh "${{ steps.release-version.outputs.version }}"
          stage_dir="build/tmp/release-version-files"
          rm -rf "$stage_dir"
          mkdir -p \
            "$stage_dir/linux" \
            "$stage_dir/lib/core/config" \
            "$stage_dir/lib/core/constants"
          cp pubspec.yaml "$stage_dir/pubspec.yaml"
          cp linux/pubspec.yaml "$stage_dir/linux/pubspec.yaml"
          cp lib/core/config/app_config.dart "$stage_dir/lib/core/config/app_config.dart"
          cp lib/core/constants/app_constants.dart "$stage_dir/lib/core/constants/app_constants.dart"

      - name: Upload versioned release files
        uses: actions/upload-artifact@v4
        with:
          name: release-version-files
          path: build/tmp/release-version-files
          if-no-files-found: error

      - name: Generate release notes
        env:
          SOURCE_COMMIT: ${{ steps.source-commit.outputs.source_commit }}
        run: |
          previous_tag="$(git describe --tags --abbrev=0 --match 'v3.0.*' "$SOURCE_COMMIT" 2>/dev/null || true)"
          if [[ -n "$previous_tag" ]]; then
            bash build/scripts/generate-changelog.sh "${{ steps.release-version.outputs.version }}" "$previous_tag" > release-notes.md
          else
            bash build/scripts/generate-changelog.sh "${{ steps.release-version.outputs.version }}" > release-notes.md
          fi
          cat <<'EOF' >> release-notes.md

          ## Download
          - amd64: bundle / deb / rpm / AppImage
          - arm64: bundle / deb / rpm / AppImage

          ## Requirements
          - Linux
          - GTK 3
          - 玲珑运行环境
          EOF

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  build-amd64:
    name: Build amd64 ${{ needs.prepare-release.outputs.version }}
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.source_commit }}
          fetch-depth: 0

      - name: Download versioned release files
        uses: actions/download-artifact@v4
        with:
          name: release-version-files
          path: release-version-files

      - name: Apply versioned release files
        run: |
          cp release-version-files/pubspec.yaml pubspec.yaml
          cp release-version-files/linux/pubspec.yaml linux/pubspec.yaml
          cp release-version-files/lib/core/config/app_config.dart lib/core/config/app_config.dart
          cp release-version-files/lib/core/constants/app_constants.dart lib/core/constants/app_constants.dart

      - name: Build bundle
        run: bash build/scripts/package-bundle.sh --version "${{ needs.prepare-release.outputs.version }}" --arch amd64

      - name: Build Debian package
        run: bash build/scripts/package-deb.sh --version "${{ needs.prepare-release.outputs.version }}" --arch amd64

      - name: Build RPM package
        run: bash build/scripts/package-rpm.sh --version "${{ needs.prepare-release.outputs.version }}" --arch amd64

      - name: Build AppImage
        run: bash build/scripts/package-appimage.sh --version "${{ needs.prepare-release.outputs.version }}" --arch amd64

      - name: Upload amd64 release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-amd64
          path: build/out/linux/${{ needs.prepare-release.outputs.version }}/amd64
          if-no-files-found: error

      - name: Upload amd64 sha256sums
        uses: actions/upload-artifact@v4
        with:
          name: sha256sums-amd64
          path: build/out/linux/${{ needs.prepare-release.outputs.version }}/amd64/sha256sum-amd64.txt
          if-no-files-found: warn

  build-arm64:
    name: Build arm64 native ${{ needs.prepare-release.outputs.version }}
    needs: prepare-release
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.source_commit }}
          fetch-depth: 0

      - name: Download versioned release files
        uses: actions/download-artifact@v4
        with:
          name: release-version-files
          path: release-version-files

      - name: Apply versioned release files
        run: |
          cp release-version-files/pubspec.yaml pubspec.yaml
          cp release-version-files/linux/pubspec.yaml linux/pubspec.yaml
          cp release-version-files/lib/core/config/app_config.dart lib/core/config/app_config.dart
          cp release-version-files/lib/core/constants/app_constants.dart lib/core/constants/app_constants.dart

      - name: Build bundle
        run: bash build/scripts/package-bundle.sh --version "${{ needs.prepare-release.outputs.version }}" --arch arm64

      - name: Build Debian package
        run: bash build/scripts/package-deb.sh --version "${{ needs.prepare-release.outputs.version }}" --arch arm64

      - name: Build RPM package
        run: bash build/scripts/package-rpm.sh --version "${{ needs.prepare-release.outputs.version }}" --arch arm64

      - name: Build AppImage
        run: bash build/scripts/package-appimage.sh --version "${{ needs.prepare-release.outputs.version }}" --arch arm64

      - name: Upload arm64 release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-arm64
          path: build/out/linux/${{ needs.prepare-release.outputs.version }}/arm64
          if-no-files-found: error

      - name: Upload arm64 sha256sums
        uses: actions/upload-artifact@v4
        with:
          name: sha256sums-arm64
          path: build/out/linux/${{ needs.prepare-release.outputs.version }}/arm64/sha256sum-arm64.txt
          if-no-files-found: warn

  build-arm64-qemu:
    name: Build arm64 fallback ${{ needs.prepare-release.outputs.version }}
    needs: [prepare-release, build-arm64]
    if: ${{ always() && (needs.build-arm64.result == 'failure' || needs.build-arm64.result == 'cancelled') }}
    runs-on: ubuntu-latest
    env:
      DOCKER_DEFAULT_PLATFORM: linux/arm64
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.source_commit }}
          fetch-depth: 0

      - name: Download versioned release files
        uses: actions/download-artifact@v4
        with:
          name: release-version-files
          path: release-version-files

      - name: Apply versioned release files
        run: |
          cp release-version-files/pubspec.yaml pubspec.yaml
          cp release-version-files/linux/pubspec.yaml linux/pubspec.yaml
          cp release-version-files/lib/core/config/app_config.dart lib/core/config/app_config.dart
          cp release-version-files/lib/core/constants/app_constants.dart lib/core/constants/app_constants.dart

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build bundle
        run: bash build/scripts/package-bundle.sh --version "${{ needs.prepare-release.outputs.version }}" --arch arm64

      - name: Build Debian package
        run: bash build/scripts/package-deb.sh --version "${{ needs.prepare-release.outputs.version }}" --arch arm64

      - name: Build RPM package
        run: bash build/scripts/package-rpm.sh --version "${{ needs.prepare-release.outputs.version }}" --arch arm64

      - name: Build AppImage
        run: bash build/scripts/package-appimage.sh --version "${{ needs.prepare-release.outputs.version }}" --arch arm64

      - name: Upload arm64 fallback release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-arm64
          path: build/out/linux/${{ needs.prepare-release.outputs.version }}/arm64
          if-no-files-found: error

      - name: Upload arm64 fallback sha256sums
        uses: actions/upload-artifact@v4
        with:
          name: sha256sums-arm64
          path: build/out/linux/${{ needs.prepare-release.outputs.version }}/arm64/sha256sum-arm64.txt
          if-no-files-found: warn

  sign-release:
    name: Sign Release Assets
    needs: [prepare-release, build-amd64, build-arm64, build-arm64-qemu]
    if: ${{ always() && needs.build-amd64.result == 'success' && (needs.build-arm64.result == 'success' || (needs.build-arm64.result != 'success' && needs.build-arm64-qemu.result == 'success')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: artifacts
          merge-multiple: true

      - name: Install RPM signing tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "GPG key imported successfully"

      - name: Configure RPM macros for signing
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # rpmsign runs without a TTY in GitHub Actions, so force loopback mode.
          install -d -m 700 ~/.gnupg
          printf '%s' "$GPG_PASSPHRASE" > ~/.gnupg/rpm-gpg-passphrase
          chmod 600 ~/.gnupg/rpm-gpg-passphrase
          gpg --batch --list-secret-keys --keyid-format LONG "$GPG_KEY_ID"
          cat > ~/.rpmmacros <<EOF
          %_signature gpg
          %_gpg_name ${GPG_KEY_ID}
          %_gpg_path ~/.gnupg
          %__gpg /usr/bin/gpg
          %_gpg_digest_algo sha256
          %__gpg_sign_cmd %{__gpg} \
            --batch --no-verbose --no-armor --no-secmem-warning \
            --pinentry-mode loopback --passphrase-file %{_gpg_path}/rpm-gpg-passphrase \
            %{?_gpg_digest_algo:--digest-algo %{_gpg_digest_algo}} \
            --local-user "%{_gpg_name}" \
            --detach-sign --sign --output %{__signature_filename} %{__plaintext_filename}
          EOF

      - name: Sign release tarballs
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd artifacts
          for tarball in **/*.tar.gz; do
            if [[ -f "$tarball" ]]; then
              echo "Signing $tarball..."
              echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback --passphrase-fd 0 \
                --armor --detach-sign "$tarball"
            fi
          done
          ls -la **/*.asc || echo "No signature files created"

      - name: Sign release RPM packages
        run: |
          trap 'rm -f ~/.gnupg/rpm-gpg-passphrase' EXIT
          cd artifacts
          for rpm in **/*.rpm; do
            if [[ -f "$rpm" ]]; then
              echo "Signing $rpm..."
              rpmsign --addsign "$rpm"
            fi
          done
          # Verify signatures
          for rpm in **/*.rpm; do
            if [[ -f "$rpm" ]]; then
              echo "Verifying $rpm..."
              rpm -K "$rpm"
            fi
          done

      - name: Upload signed assets
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-assets
          path: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.asc
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
          if-no-files-found: error

  finalize-release-state:
    name: Finalize release git state ${{ needs.prepare-release.outputs.version }}
    needs: [prepare-release, sign-release]
    if: ${{ always() && needs.sign-release.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.source_commit }}
          fetch-depth: 0

      - name: Download versioned release files
        uses: actions/download-artifact@v4
        with:
          name: release-version-files
          path: release-version-files

      - name: Verify default branch head is unchanged
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          SOURCE_COMMIT: ${{ needs.prepare-release.outputs.source_commit }}
        run: |
          git fetch origin "$DEFAULT_BRANCH"
          remote_head="$(git rev-parse "origin/$DEFAULT_BRANCH")"
          if [[ "$remote_head" != "$SOURCE_COMMIT" ]]; then
            echo "Default branch moved from $SOURCE_COMMIT to $remote_head during release execution." >&2
            exit 1
          fi

      - name: Apply versioned release files
        run: |
          cp release-version-files/pubspec.yaml pubspec.yaml
          cp release-version-files/linux/pubspec.yaml linux/pubspec.yaml
          cp release-version-files/lib/core/config/app_config.dart lib/core/config/app_config.dart
          cp release-version-files/lib/core/constants/app_constants.dart lib/core/constants/app_constants.dart

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit release version bump
        run: |
          git add pubspec.yaml linux/pubspec.yaml lib/core/config/app_config.dart lib/core/constants/app_constants.dart
          git commit -m "chore: release ${{ needs.prepare-release.outputs.version }}"

      - name: Push release commit
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Create release tag
        run: git tag "${{ needs.prepare-release.outputs.tag }}"

      - name: Push release tag
        run: git push origin "${{ needs.prepare-release.outputs.tag }}"

  publish-release:
    name: Publish GitHub Release ${{ needs.prepare-release.outputs.version }}
    needs: [prepare-release, sign-release, finalize-release-state]
    if: ${{ always() && needs.sign-release.result == 'success' && needs.finalize-release-state.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: release-notes

      - name: Download signed release assets
        uses: actions/download-artifact@v4
        with:
          name: signed-release-assets
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: 玲珑应用商店社区版 ${{ needs.prepare-release.outputs.tag }}
          body_path: release-notes/release-notes.md
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.asc
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage

  publish-aur:
    name: Publish to AUR ${{ needs.prepare-release.outputs.version }}
    needs: [prepare-release, publish-release]
    if: ${{ always() && needs.publish-release.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          fetch-depth: 0

      - name: Download sha256sums
        uses: actions/download-artifact@v4
        with:
          pattern: sha256sums-*
          path: sha256sums
          merge-multiple: true

      - name: Download signed assets for signature SHA256
        uses: actions/download-artifact@v4
        with:
          name: signed-release-assets
          path: signed-assets

      - name: Calculate checksums
        id: checksums
        run: |
          # Read tarball SHA256
          sha_amd64=""
          sha_arm64=""

          if [[ -f "sha256sums/sha256sum-amd64.txt" ]]; then
            sha_amd64=$(cat "sha256sums/sha256sum-amd64.txt")
            echo "AMD64 SHA256: $sha_amd64"
          fi

          if [[ -f "sha256sums/sha256sum-arm64.txt" ]]; then
            sha_arm64=$(cat "sha256sums/sha256sum-arm64.txt")
            echo "ARM64 SHA256: $sha_arm64"
          fi

          # Calculate signature SHA256
          sha_sig_amd64=""
          sha_sig_arm64=""

          # Find signature files
          sig_amd64=$(find signed-assets -name "*amd64.tar.gz.asc" | head -1)
          sig_arm64=$(find signed-assets -name "*arm64.tar.gz.asc" | head -1)

          if [[ -n "$sig_amd64" && -f "$sig_amd64" ]]; then
            sha_sig_amd64=$(sha256sum "$sig_amd64" | awk '{print $1}')
            echo "AMD64 signature SHA256: $sha_sig_amd64"
          fi

          if [[ -n "$sig_arm64" && -f "$sig_arm64" ]]; then
            sha_sig_arm64=$(sha256sum "$sig_arm64" | awk '{print $1}')
            echo "ARM64 signature SHA256: $sha_sig_arm64"
          fi

          echo "sha_amd64=$sha_amd64" >> "$GITHUB_OUTPUT"
          echo "sha_arm64=$sha_arm64" >> "$GITHUB_OUTPUT"
          echo "sha_sig_amd64=$sha_sig_amd64" >> "$GITHUB_OUTPUT"
          echo "sha_sig_arm64=$sha_sig_arm64" >> "$GITHUB_OUTPUT"

      - name: Setup SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_key
            User aur
          EOF
          chmod 600 ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Validate AUR package in Arch Linux
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          bash build/scripts/validate-aur-package.sh \
            --version "${{ needs.prepare-release.outputs.version }}" \
            --sha256-amd64 "${{ steps.checksums.outputs.sha_amd64 }}" \
            --sha256-arm64 "${{ steps.checksums.outputs.sha_arm64 }}" \
            --sha256-sig-amd64 "${{ steps.checksums.outputs.sha_sig_amd64 }}" \
            --sha256-sig-arm64 "${{ steps.checksums.outputs.sha_sig_arm64 }}" \
            --gpg-key-id "$GPG_KEY_ID"

      - name: Publish AUR package
        env:
          SHA256_AMD64: ${{ steps.checksums.outputs.sha_amd64 }}
          SHA256_ARM64: ${{ steps.checksums.outputs.sha_arm64 }}
          SHA256_SIG_AMD64: ${{ steps.checksums.outputs.sha_sig_amd64 }}
          SHA256_SIG_ARM64: ${{ steps.checksums.outputs.sha_sig_arm64 }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: bash build/scripts/publish-aur.sh --version "${{ needs.prepare-release.outputs.version }}"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/aur_key
